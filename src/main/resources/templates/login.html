<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - TaskFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #313244; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
        .logo { font-size: 28px; font-weight: bold; color: #cba6f7; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #a6adc8; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #a6adc8; margin-bottom: 8px; }
        input {
            width: 100%;
            background: #45475a;
            border: 1px solid #585b70;
            border-radius: 8px;
            padding: 12px 14px;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #cba6f7; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 8px; }
        .btn-purple { background: #cba6f7; color: #1e1e2e; }
        .btn:hover { opacity: 0.85; }
        .erro { background: #f38ba822; color: #f38ba8; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; text-align: center; }
        .cadastro-link { text-align: center; margin-top: 20px; font-size: 14px; color: #a6adc8; }
        .cadastro-link a { color: #cba6f7; text-decoration: none; }
        .cadastro-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🚀 TaskFlow</div>
    <p class="subtitle">Otimizador inteligente de tarefas</p>

    <div class="erro" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="seu@email.com" required/>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-purple">Entrar</button>
    </form>

    <div class="cadastro-link">
        Não tem conta? <a th:href="@{/cadastro}">Cadastre-se</a>
    </div>
</div>

</body>
</html>
