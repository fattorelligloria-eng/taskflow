<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - TaskFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #cdd6f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .cadastro-card { background: #313244; border-radius: 16px; padding: 40px; width: 100%; max-width: 480px; }
        .logo { font-size: 28px; font-weight: bold; color: #cba6f7; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #a6adc8; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #a6adc8; margin-bottom: 8px; }
        input { width: 100%; background: #45475a; border: 1px solid #585b70; border-radius: 8px; padding: 12px 14px; color: #cdd6f4; font-size: 14px; outline: none; }
        input:focus { border-color: #cba6f7; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 8px; }
        .btn-purple { background: #cba6f7; color: #1e1e2e; }
        .btn:hover { opacity: 0.85; }
        .erro { background: #f38ba822; color: #f38ba8; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; text-align: center; }
        .login-link { text-align: center; margin-top: 20px; font-size: 14px; color: #a6adc8; }
        .login-link a { color: #cba6f7; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="cadastro-card">
    <div class="logo">🚀 TaskFlow</div>
    <p class="subtitle">Crie sua conta gratuitamente</p>

    <div class="erro" th:if="${erro}" th:text="${erro}"></div>

    <form th:action="@{/cadastro}" method="post">
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" name="nome" placeholder="Seu nome completo" required/>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="seu@email.com" required/>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf" placeholder="000.000.000-00" required/>
            </div>
            <div class="form-group">
                <label>Idade</label>
                <input type="number" name="idade" placeholder="25" required/>
            </div>
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn btn-purple">Criar conta</button>
    </form>

    <div class="login-link">
        Já tem conta? <a th:href="@{/login}">Entrar</a>
    </div>
</div>

</body>
</html>
